# Example TOML config for a backup label.
# Place in <executable-dir>/.config/<source>-backup.toml
#
# Tables:
#   [common]  - Settings shared across local and remote modes
#   [local]   - Settings for local backup mode (default)
#   [remote]  - Settings for remote backup mode (--remote flag)
#
# If both [common] and the active target table define the same key,
# the active target table wins.

[common]
prune = "-keep 1:728 -keep 91:364 -keep 28:182 -keep 7:28"
filter = "e:^(.*/)?(@eaDir|#recycle|tmp|exclude)/$|^(.*/)?(\\.DS_Store|\\._.*|Thumbs\\.db)$"
log_retention_days = 30
safe_prune_max_delete_percent = 10
safe_prune_max_delete_count = 25
safe_prune_min_total_for_percent = 20

[local]
destination = "/volume2/backups"
threads = 4

# These settings must be in [local] only.
local_owner = "myuser"
local_group = "users"

[remote]
destination = "s3://gateway.storjshare.io/my-backup-bucket"
threads = 8
