# Example secrets file for the homes label.
# Example only; replace all placeholder values before use.
# Place in /root/.secrets/homes-secrets.toml
#
# IMPORTANT:
#   - Duplicacy storage targets can store runtime preference keys in this file
#   - Any target may also store optional notification auth tokens here
#   - Notification auth tokens are target-scoped; repeat them under each
#     [targets.<name>] section that needs authenticated delivery
#   - File must be owned by root:root
#   - File permissions must be 0600
#   - A target section may contain only health_webhook_bearer_token /
#     health_ntfy_token if no storage credentials are needed for that target
#
# To set correct permissions:
#   chown root:root /root/.secrets/homes-secrets.toml
#   chmod 600 /root/.secrets/homes-secrets.toml

[targets.offsite-storj]
health_webhook_bearer_token = "optional-webhook-bearer-token"
health_ntfy_token = "optional-ntfy-bearer-token"

[targets.offsite-storj.keys]
s3_id = "your-s3-access-key-id-here"
s3_secret = "your-s3-secret-access-key-here"

[targets.onsite-usb]
health_ntfy_token = "optional-ntfy-bearer-token"
