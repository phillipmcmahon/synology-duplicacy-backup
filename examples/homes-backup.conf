# Example configuration file for duplicacy-backup.
# Place in <executable-dir>/.config/<source>-backup.conf
#
# Sections:
#   [common]  - Settings shared across local and remote modes
#   [local]   - Settings for local backup mode (default)
#   [remote]  - Settings for remote backup mode (--remote flag)
#
# If both [common] and the target section define the same key,
# the target section value wins.

[common]
# Prune retention policy (duplicacy prune arguments)
# Keep 1 revision per 728 days, 1 per 91 days for last year, etc.
PRUNE=-keep 1:728 -keep 91:364 -keep 28:182 -keep 7:28

# Duplicacy filter patterns (one per line, embedded newlines)
# Use +<pattern> to include, -<pattern> to exclude
FILTER=-*/.Trash-*/-*/@eaDir/

# Local repository ownership
LOCAL_OWNER=myuser
LOCAL_GROUP=users

# How many days to keep log files
LOG_RETENTION_DAYS=30

# Safe prune thresholds
SAFE_PRUNE_MAX_DELETE_PERCENT=10
SAFE_PRUNE_MAX_DELETE_COUNT=25
SAFE_PRUNE_MIN_TOTAL_FOR_PERCENT=20

[local]
# Local backup destination (directory path)
DESTINATION=/volume2/backups

# Number of backup threads (must be power of 2, max 16)
THREADS=4

[remote]
# Remote backup destination (S3-compatible URL)
DESTINATION=s3://gateway.storjshare.io/my-backup-bucket

# Number of backup threads for remote
THREADS=8
