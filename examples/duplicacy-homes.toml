# Example TOML secrets file for remote backup mode.
# Place in /root/.secrets/duplicacy-<label>.toml
#
# IMPORTANT:
#   - File must be owned by root:root
#   - File permissions must be 0600
#   - Only storj_s3_id, storj_s3_secret, and optional
#     health_webhook_bearer_token are allowed
#
# To set correct permissions:
#   chown root:root /root/.secrets/duplicacy-homes.toml
#   chmod 600 /root/.secrets/duplicacy-homes.toml

storj_s3_id = "your-storj-s3-access-key-id-here"
storj_s3_secret = "your-storj-s3-secret-access-key-here"
health_webhook_bearer_token = "optional-webhook-bearer-token"
