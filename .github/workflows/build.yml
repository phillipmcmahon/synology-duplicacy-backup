name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

# env:
  # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: '7'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Set version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" =~ ^v ]]; then
            VERSION="${VERSION#v}"
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binary and package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARM_VALUE="${{ matrix.goarm }}"
          PACKAGE_ARGS=(
            --repo-root "$PWD"
            --version "${{ steps.version.outputs.version }}"
            --build-time "${BUILD_TIME}"
            --goos "${{ matrix.goos }}"
            --goarch "${{ matrix.goarch }}"
            --output-dir "$PWD"
          )

          if [[ -n "${GOARM_VALUE}" ]]; then
            PACKAGE_ARGS+=(--goarm "${GOARM_VALUE}")
          fi

          BASENAME="$(sh scripts/package-linux-artifact.sh "${PACKAGE_ARGS[@]}")"

          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: tarball_${{ steps.package.outputs.basename }}
          path: |
            ${{ steps.package.outputs.basename }}.tar.gz
            ${{ steps.package.outputs.basename }}.tar.gz.sha256

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release

          find artifacts -type f \
            -name '*.tar.gz' \
            -exec cp {} release/ \;
          find artifacts -type f \
            -name '*.tar.gz.sha256' \
            -exec cp {} release/ \;

          cd release

          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-from-tag \
            --verify-tag
