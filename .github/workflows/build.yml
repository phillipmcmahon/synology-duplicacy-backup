name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -v -race ./...

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: '7'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Set version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="dev-${GITHUB_SHA::8}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binary and package
        id: package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          ARCH_SUFFIX="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            ARCH_SUFFIX="${ARCH_SUFFIX}v${{ matrix.goarm }}"
          fi

          BASENAME="duplicacy-backup_${VERSION}_${{ matrix.goos }}_${ARCH_SUFFIX}"
          PKG_DIR="${BASENAME}"

          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"
          echo "pkg_dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"

          go build \
            -ldflags "-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
            -o "${BASENAME}" \
            cmd/duplicacy-backup/main.go

          mkdir -p "${PKG_DIR}"
          cp "${BASENAME}" "${PKG_DIR}/"
          cp README.md LICENSE "${PKG_DIR}/"

          tar -czf "${BASENAME}.tar.gz" "${PKG_DIR}"

      - name: Upload raw binary
        uses: actions/upload-artifact@v6
        with:
          name: raw_${{ steps.package.outputs.basename }}
          path: ${{ steps.package.outputs.basename }}

      - name: Upload tarball
        uses: actions/upload-artifact@v6
        with:
          name: tarball_${{ steps.package.outputs.basename }}
          path: ${{ steps.package.outputs.basename }}.tar.gz

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release

          find artifacts -type f \
            \( -name 'duplicacy-backup_*' -o -name '*.tar.gz' \) \
            -exec cp {} release/ \;

          cd release

          for file in *; do
            sha256sum "$file" > "${file}.sha256"
          done

          sha256sum * > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
